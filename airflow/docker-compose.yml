# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Airflow local development setup
#
# Spins up:
#   - airflow-webserver  → UI at http://localhost:8080
#   - airflow-scheduler  → watches dags/ and runs them
#   - postgres           → Airflow's metadata database
#
# Usage:
#   docker-compose up -d
#   open http://localhost:8080  (user: airflow / password: airflow)
#   docker-compose down
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

x-airflow-common: &airflow-common
  #image: apache/airflow:2.9.1-python3.11
  build: .
  environment:
    # Point Airflow at our Postgres metadata database
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # Use LocalExecutor — runs tasks in subprocesses on the same machine
    # Good enough for learning; swap for CeleryExecutor in production
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # Disable the default example DAGs so only ours show up
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    # AWS credentials — the DAG uses these to call AWS APIs
    # Replace with your actual keys, or use aws_profile below
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: eu-central-1

  volumes:
    # Mount local dags/ folder into the container — changes are picked up live
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins

  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # One-time init: creates DB tables and the default admin user
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

volumes:
  postgres_data:
